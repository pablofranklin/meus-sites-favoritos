<!DOCTYPE html>
<html lang="pt-br">

<head>
  <!-- Define o título que aparece na aba do navegador -->
  <meta charset="UTF-8">
  <title>Meus sites favoritos</title>

  <!-- Estilo visual da página -->
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f4f8;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 40px;
    }

    h2 {
      color: #34495e;
      margin-bottom: 8px;
    }

    .site {
      display: inline-block;
      background-color: white;
      border-radius: 12px;
      padding: 20px;
      margin: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 200px;
      vertical-align: top;
    }

    img {
      width: 180px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    a {
      display: block;
      margin-top: 10px;
      color: #2980b9;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- Título principal da página com seu nome -->
  <h1>Meus sites favoritos: Pablo Franklin</h1>

  <!-- ============ SITE 1 ============ -->
  <div class="site">
    <!-- Nome do site acima da imagem -->
    <h2>YouTube</h2>

    <!-- Imagem clicável que leva ao site -->
    <a href="https://www.youtube.com" target="_blank">
      <img src="youtube.png" alt="YouTube">
    </a>

    <!-- Link abaixo da imagem -->
    <a href="https://www.youtube.com" target="_blank">
      www.youtube.com
    </a>
  </div>

  <!-- ============ SITE 2 ============ -->
  <div class="site">
    <h2>Instagram</h2>
    <a href="https://www.instagram.com" target="_blank">
      <img src="instagram.png" alt="Instagram">
    </a>
    <a href="https://www.instagram.com" target="_blank">
      www.instagram.com
    </a>
  </div>

  <!-- ============ SITE 3 ============ -->
  <div class="site">
    <h2>Primevideo</h2>
    <a href="https://www.primevideo.com" target="_blank">
      <img src="primevideo.png" alt="Primevideo">
    </a>
    <a href="https://www.primevideo.com" target="_blank">
      www.primevideo.com
    </a>
  </div>

  <!-- ============ SITE 4 ============ -->
  <div class="site">
    <h2>Tiktok</h2>
    <a href="https://www.tiktok.com" target="_blank">
      <img src="tiktok.png" alt="Tiktok">
    </a>
    <a href="https://www.tiktok.com" target="_blank">
      www.tiktok.com
    </a>
  </div>

  <!-- ============ SITE 5 ============ -->
  <div class="site">
    <h2>Spotify</h2>
    <a href="https://www.spotify.com" target="_blank">
      <img src="spotify.png" alt="Spotify">
    </a>
    <a href="https://www.spotify.com" target="_blank">
      www.spotify.com
    </a>
  </div>

</body>
</html>
